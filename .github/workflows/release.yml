name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, linux-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish main app
        run: dotnet publish src/TdnsAdvAppConfig/TdnsAdvAppConfig.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/${{ matrix.rid }}

      - name: Publish Windows updater helper
        if: matrix.rid == 'win-x64'
        run: dotnet publish src/TdnsAdvAppConfig.Updater/TdnsAdvAppConfig.Updater.csproj -c Release -r win-x64 --self-contained true -o publish/${{ matrix.rid }}

      - name: Bundle Windows service scripts
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Copy-Item deploy/windows/*.ps1 publish/${{ matrix.rid }}/

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath TDNS-AdvAppConfig-${{ matrix.rid }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TDNS-AdvAppConfig-${{ matrix.rid }}
          path: TDNS-AdvAppConfig-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
